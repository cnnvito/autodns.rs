<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/appicon.png" />
    <title>autodns</title>
  </head>
  <body>
    <script>
      window.__autodnsShowBootError = function (message) {
        var root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<main style="padding:28px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#18201b">' +
          '<section style="border:1px solid #cbd5cc;border-radius:8px;background:#fffef8;padding:18px;max-width:760px">' +
          '<h1 style="margin:0 0 8px;font-size:22px">autodns 渲染失败</h1>' +
          '<p style="margin:0 0 14px;color:#66746a">桌面外壳已经加载，但前端脚本发生了错误。</p>' +
          '<pre style="white-space:pre-wrap;background:#f3f0e7;border-radius:6px;padding:12px;overflow:auto">' +
          String(message).replace(/[<>&]/g, function (ch) { return ({ "<": "&lt;", ">": "&gt;", "&": "&amp;" })[ch]; }) +
          "</pre></section></main>";
      };
      window.addEventListener("error", function (event) {
        window.__autodnsShowBootError(event.message || event.error || "未知脚本错误");
      });
      window.addEventListener("unhandledrejection", function (event) {
        window.__autodnsShowBootError(event.reason && event.reason.message ? event.reason.message : event.reason);
      });
    </script>
    <div id="root">
      <main style="padding:28px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;color:#18201b">
        <section style="border:1px solid #cbd5cc;border-radius:8px;background:#fffef8;padding:18px;max-width:760px">
          <h1 style="margin:0 0 8px;font-size:22px">autodns</h1>
          <p style="margin:0;color:#66746a">正在加载桌面控制台...</p>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
