name: Release Tauri Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "22"
  RUST_BACKTRACE: "1"

jobs:
  release:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 MSI
            os: windows-2025
            args: "--bundles msi"
          - name: macOS Apple Silicon
            os: macos-15
            args: "--target aarch64-apple-darwin"
          - name: macOS Intel
            os: macos-15-intel
            args: "--target x86_64-apple-darwin"

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Apple Silicon Rust target
        if: contains(matrix.args, 'aarch64-apple-darwin')
        run: rustup target add aarch64-apple-darwin

      - name: Add macOS Intel Rust target
        if: contains(matrix.args, 'x86_64-apple-darwin')
        run: rustup target add x86_64-apple-darwin

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Windows MSI dependencies
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $wix = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          if (!(Test-Path (Join-Path $wix "candle.exe"))) {
            choco install wixtoolset -y
          }
          echo "$wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build and upload Tauri bundles
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          args: ${{ matrix.args }}
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: "autodns desktop ${{ steps.release.outputs.tag }}"
          releaseBody: "Automated desktop build for ${{ steps.release.outputs.tag }}."
          releaseDraft: true
          prerelease: false
